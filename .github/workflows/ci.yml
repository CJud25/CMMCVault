name: CI

on:
  push:
  pull_request:

# Least privilege: the workflow only needs to read the checked-out code.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest pytest-cov ruff
      - name: Lint (ruff)
        run: ruff check .
      - name: Tests (pytest)
        run: python -m pytest -q
      - name: Catalog integrity check
        run: python scripts/build_catalog.py --check
